version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # ⚠️  Set VITE_API_URL in Dokploy → Environment before deploying.
        # This value is baked into the JS bundle at build time.
        # Example: VITE_API_URL=https://api.tu-dominio.com
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5242}
    container_name: serverpilot-client
    restart: unless-stopped
    # ports:
    #   - "${PORT:-3000}:80"
